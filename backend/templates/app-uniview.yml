# The monitoring type category：service-application service monitoring db-database monitoring custom-custom monitoring os-operating system monitoring
category: server
# The monitoring type eg: linux windows tomcat mysql aws...
app: uniview
# The monitoring i18n name
name:
  zh-CN: 宇视
  en-US: Uniview
  ja-JP: Uniview
# The description and help of this monitoring type
help:
  zh-CN: 通过HTTP接口监控宇视设备状态，获取设备健康数据。
  en-US: Monitor Uniview devices through HTTP interface to collect health data.
  ja-JP: Hertzbeat は HTTPインターフェースを呼び出してUniviewデバイスの健全データを収集します。

# Input params define for monitoring(render web ui by the definition)
params:
  - field: host
    name:
      zh-CN: 主机Host
      en-US: Host
      ja-JP: ホスト
    type: host
    required: true
  - field: port
    name:
      zh-CN: 端口
      en-US: Port
      ja-JP: ポート
    type: number
    range: '[0,65535]'
    required: true
    defaultValue: 80
  - field: timeout
    name:
      zh-CN: 超时时间(ms)
      en-US: Timeout(ms)
      ja-JP: タイムアウト（ｍｓ）
    type: number
    range: '[1000,60000]'
    required: true
    defaultValue: 5000
  - field: username
    name:
      zh-CN: 用户名
      en-US: Username
      ja-JP: ユーザー名
    type: text
    required: true
  - field: password
    name:
      zh-CN: 密码
      en-US: Password
      ja-JP: パスワード
    type: password
    required: true
  - field: ssl
    name:
      zh-CN: 启用HTTPS
      en-US: SSL
      ja-JP: SSL
    type: boolean
    required: false
    defaultValue: false

# collect metrics config list
metrics:
  - name: system_info
    i18n:
      zh-CN: 系统信息
      en-US: System Info
      ja-JP: システム情報
    priority: 0
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: /LAPI/V1.0/System/DeviceInfo
      method: GET
      timeout: ^_^timeout^_^
      authorization:
        type: Digest Auth
        digestAuthUsername: ^_^username^_^
        digestAuthPassword: ^_^password^_^
      parseType: jsonPath
      parseScript: '$.Response.Data'
    fields:
      - field: DeviceName
        type: 1
        i18n:
          zh-CN: 设备名称
          en-US: Device Name
          ja-JP: デバイス名
      - field: SerialNumber
        type: 1
        i18n:
          zh-CN: 序列号
          en-US: SerialNumber
          ja-JP: シリアル番号
      - field: FirmwareVersion
        type: 1
        i18n:
          zh-CN: 固件版本
          en-US: Firmware Version
          ja-JP: ファームウェアバージョン
      - field: DeviceModel
        type: 1
        i18n:
          zh-CN: 设备型号
          en-US: Device Model
          ja-JP: デバイスモデル
  - name: ntp_info
    i18n:
      zh-CN: 校时信息
      en-US: NTP Info
      ja-JP: NTP情報
    priority: 0
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: /LAPI/V1.0/System/Time/NTP
      method: GET
      timeout: ^_^timeout^_^
      authorization:
        type: Digest Auth
        digestAuthUsername: ^_^username^_^
        digestAuthPassword: ^_^password^_^
      parseType: jsonPath
      parseScript: '$.Response.Data.NTPServerInfos[0]'
    fields:
      - field: IPAddress
        type: 1
        i18n:
          zh-CN: IP地址
          en-US: IP Address
          ja-JP: IP アドレス
      - field: Port
        type: 1
        i18n:
          zh-CN: 端口号
          en-US: Port
          ja-JP: ポート
      - field: SynchronizeInterval
        type: 1
        i18n:
          zh-CN: 同步间隔
          en-US: SynchronizeInterval
          ja-JP: 同期間隔
      - field: Enabled
        type: 1
        i18n:
          zh-CN: 是否启用
          en-US: Enabled
          ja-JP: 有効化

alerts:
  - key: 'uniview_unavailable'
    name: '宇视设备设备不可用'
    type: 'realtime_metric'
    metric: 'uniview_server_up'
    operator: '=='
    threshold: 0
    level: 'critical'
    period: 60
    times: 1
    mode: 'core'
    enabled: true
    expr: 'uniview_server_up == 0'
    template: '设备不可用'
  - key: 'uniview_ntp_disabled'
    name: '宇视NTP未启用'
    type: 'realtime_metric'
    metric: 'Enabled'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 600
    times: 1
    mode: 'core'
    enabled: true
    expr: 'Enabled == ''false'''
    template: 'NTP未启用'
  - key: 'uniview_ntp_server_missing'
    name: '宇视NTP服务器缺失'
    type: 'realtime_metric'
    metric: 'IPAddress'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 600
    times: 1
    mode: 'core'
    enabled: true
    expr: 'IPAddress == '''''
    template: 'NTP服务器缺失'
  - key: 'uniview_ntp_port_abnormal'
    name: '宇视NTP端口异常'
    type: 'periodic_metric'
    metric: 'Port'
    operator: '!='
    threshold: 123
    level: 'warning'
    period: 600
    times: 2
    mode: 'extended'
    enabled: false
    expr: 'Port != 123'
    template: 'NTP端口异常'
  - key: 'uniview_sync_interval_too_long'
    name: '宇视NTP同步周期过长'
    type: 'periodic_metric'
    metric: 'SynchronizeInterval'
    operator: '>'
    threshold: 86400
    level: 'warning'
    period: 1800
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'SynchronizeInterval > 86400'
    template: 'NTP同步周期过长'
  - key: 'uniview_firmware_missing'
    name: '宇视固件版本缺失'
    type: 'realtime_metric'
    metric: 'FirmwareVersion'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 3600
    times: 1
    mode: 'core'
    enabled: true
    expr: 'FirmwareVersion == '''''
    template: '固件版本缺失'
  - key: 'uniview_model_missing'
    name: '宇视设备型号缺失'
    type: 'realtime_metric'
    metric: 'DeviceModel'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 3600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'DeviceModel == '''''
    template: '设备型号缺失'
  - key: 'uniview_serial_missing'
    name: '宇视序列号缺失'
    type: 'realtime_metric'
    metric: 'SerialNumber'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 3600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'SerialNumber == '''''
    template: '序列号缺失'
  - key: 'uniview_device_name_missing'
    name: '宇视设备名称缺失'
    type: 'realtime_metric'
    metric: 'DeviceName'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 3600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'DeviceName == '''''
    template: '设备名称缺失'
  - key: 'uniview_ntp_ip_loopback'
    name: '宇视NTP地址配置异常'
    type: 'realtime_metric'
    metric: 'IPAddress'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'IPAddress == ''127.0.0.1'''
    template: 'NTP地址配置异常'
