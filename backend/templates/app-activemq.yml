category: mid
app: activemq
name:
  zh-CN: ActiveMQ消息系统
  en-US: ActiveMQ Message
help:
  zh-CN: 基于 Jolokia HTTP 接口采集 ActiveMQ 关键运行指标。请确保 Broker 已启用 Jolokia Agent，并开放对应端口。
  en-US: Monitor ActiveMQ through Jolokia HTTP endpoint. Ensure Jolokia agent is enabled on broker side.
helpLink:
  zh-CN: https://hertzbeat.apache.org/zh-cn/docs/help/activemq
  en-US: https://hertzbeat.apache.org/docs/help/activemq
params:
  - field: host
    name:
      zh-CN: 目标 Host
      en-US: Target Host
    type: host
    required: true
  - field: port
    name:
      zh-CN: Jolokia 端口
      en-US: Jolokia Port
    type: number
    range: '[0,65535]'
    required: true
    defaultValue: 8778
  - field: path
    name:
      zh-CN: Jolokia 路径
      en-US: Jolokia Path
    type: text
    required: true
    defaultValue: /jolokia/
  - field: ssl
    name:
      zh-CN: 启用 HTTPS
      en-US: Enable HTTPS
    type: boolean
    required: false
    defaultValue: false
  - field: username
    name:
      zh-CN: 用户名
      en-US: Username
    type: text
    required: false
    hide: true
  - field: password
    name:
      zh-CN: 密码
      en-US: Password
    type: password
    required: false
    hide: true
metrics:
  - name: basic
    i18n:
      zh-CN: 虚拟机基础信息
      en-US: JVM Basic
    priority: 0
    fields:
      - field: VmName
        type: 1
      - field: VmVendor
        type: 1
      - field: VmVersion
        type: 1
      - field: Uptime
        type: 0
        unit: ms
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: ^_^path^_^
      method: POST
      headers.Content-Type: application/json
      headers.Accept: application/json
      body: '{"type":"read","mbean":"java.lang:type=Runtime","attribute":["VmName","VmVendor","VmVersion","Uptime"]}'
      parseType: jsonPath
      parseScript: $.value
      authorization.basicAuthUsername: ^_^username^_^
      authorization.basicAuthPassword: ^_^password^_^
  - name: broker
    i18n:
      zh-CN: Broker 信息
      en-US: Broker Info
    priority: 1
    fields:
      - field: BrokerName
        type: 1
        label: true
      - field: UptimeMillis
        type: 0
        unit: ms
      - field: MemoryPercentUsage
        type: 0
        unit: '%'
      - field: StorePercentUsage
        type: 0
        unit: '%'
      - field: TempPercentUsage
        type: 0
        unit: '%'
      - field: CurrentConnectionsCount
        type: 0
      - field: TotalConnectionsCount
        type: 0
      - field: TotalEnqueueCount
        type: 0
      - field: TotalDequeueCount
        type: 0
      - field: TotalConsumerCount
        type: 0
      - field: TotalProducerCount
        type: 0
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: ^_^path^_^
      method: POST
      headers.Content-Type: application/json
      headers.Accept: application/json
      body: '{"type":"read","mbean":"org.apache.activemq:type=Broker,brokerName=*","attribute":["BrokerName","UptimeMillis","MemoryPercentUsage","StorePercentUsage","TempPercentUsage","CurrentConnectionsCount","TotalConnectionsCount","TotalEnqueueCount","TotalDequeueCount","TotalConsumerCount","TotalProducerCount"]}'
      parseType: jsonPath
      parseScript: $.value.*
      authorization.basicAuthUsername: ^_^username^_^
      authorization.basicAuthPassword: ^_^password^_^

alerts:
  - key: 'activemq_unavailable'
    name: 'ActiveMQ实例不可用'
    type: 'realtime_metric'
    metric: 'activemq_server_up'
    operator: '=='
    threshold: 0
    level: 'critical'
    period: 60
    times: 1
    mode: 'core'
    enabled: true
    expr: 'activemq_server_up == 0'
    template: '实例不可用'
  - key: 'activemq_memory_usage_high'
    name: 'ActiveMQ内存使用率偏高'
    type: 'periodic_metric'
    metric: 'MemoryPercentUsage'
    operator: '>'
    threshold: 75
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'MemoryPercentUsage > 75'
    template: '内存使用率偏高'
  - key: 'activemq_memory_usage_critical'
    name: 'ActiveMQ内存使用率过高'
    type: 'periodic_metric'
    metric: 'MemoryPercentUsage'
    operator: '>'
    threshold: 90
    level: 'critical'
    period: 300
    times: 1
    mode: 'core'
    enabled: true
    expr: 'MemoryPercentUsage > 90'
    template: '内存使用率过高'
  - key: 'activemq_store_usage_high'
    name: 'ActiveMQ存储使用率偏高'
    type: 'periodic_metric'
    metric: 'StorePercentUsage'
    operator: '>'
    threshold: 75
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'StorePercentUsage > 75'
    template: '存储使用率偏高'
  - key: 'activemq_store_usage_critical'
    name: 'ActiveMQ存储使用率过高'
    type: 'periodic_metric'
    metric: 'StorePercentUsage'
    operator: '>'
    threshold: 90
    level: 'critical'
    period: 300
    times: 1
    mode: 'core'
    enabled: true
    expr: 'StorePercentUsage > 90'
    template: '存储使用率过高'
  - key: 'activemq_temp_usage_high'
    name: 'ActiveMQ临时存储使用率偏高'
    type: 'periodic_metric'
    metric: 'TempPercentUsage'
    operator: '>'
    threshold: 70
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'TempPercentUsage > 70'
    template: '临时存储使用率偏高'
  - key: 'activemq_connections_high'
    name: 'ActiveMQ当前连接数偏高'
    type: 'periodic_metric'
    metric: 'CurrentConnectionsCount'
    operator: '>'
    threshold: 500
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'CurrentConnectionsCount > 500'
    template: '当前连接数偏高'
  - key: 'activemq_producers_drop'
    name: 'ActiveMQ生产者数量异常下降'
    type: 'periodic_metric'
    metric: 'TotalProducerCount'
    operator: '<'
    threshold: 1
    level: 'warning'
    period: 600
    times: 2
    mode: 'extended'
    enabled: false
    expr: 'TotalProducerCount < 1'
    template: '生产者数量异常下降'
  - key: 'activemq_consumers_drop'
    name: 'ActiveMQ消费者数量异常下降'
    type: 'periodic_metric'
    metric: 'TotalConsumerCount'
    operator: '<'
    threshold: 1
    level: 'warning'
    period: 600
    times: 2
    mode: 'extended'
    enabled: false
    expr: 'TotalConsumerCount < 1'
    template: '消费者数量异常下降'
  - key: 'activemq_queue_backlog'
    name: 'ActiveMQ消息积压扩大'
    type: 'periodic_metric'
    metric: 'TotalEnqueueCount'
    operator: '>'
    threshold: 100000
    level: 'warning'
    period: 300
    times: 2
    mode: 'extended'
    enabled: false
    expr: '(TotalEnqueueCount - TotalDequeueCount) > 100000'
    template: '消息积压扩大'
  - key: 'activemq_uptime_short'
    name: 'ActiveMQ疑似频繁重启'
    type: 'periodic_metric'
    metric: 'UptimeMillis'
    operator: '<'
    threshold: 3600000
    level: 'warning'
    period: 600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'UptimeMillis < 3600000'
    template: '疑似频繁重启'
