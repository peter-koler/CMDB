category: os
app: windows
name:
  zh-CN: Windows操作系统
  en-US: OS Windows
help:
  zh-CN: 使用 SNMP 方式采集 Windows 主机关键系统指标（名称、运行时长、进程数、用户数、内存）。
  en-US: Collect key Windows system metrics via SNMP.
params:
  - field: host
    name:
      zh-CN: 目标 Host
      en-US: Target Host
    type: host
    required: true
  - field: port
    name:
      zh-CN: SNMP端口
      en-US: SNMP Port
    type: number
    range: '[0,65535]'
    required: true
    defaultValue: 161
  - field: community
    name:
      zh-CN: SNMP 团体字
      en-US: SNMP Community
    type: text
    required: true
    defaultValue: public
  - field: snmpVersion
    name:
      zh-CN: SNMP 版本
      en-US: SNMP Version
    type: radio
    required: true
    defaultValue: 1
    options:
      - label: SNMPv1
        value: 0
      - label: SNMPv2c
        value: 1
  - field: timeout
    name:
      zh-CN: 超时时间(ms)
      en-US: Timeout(ms)
    type: number
    range: '[0,100000]'
    required: false
    defaultValue: 6000
metrics:
  - name: system
    i18n:
      zh-CN: 系统
      en-US: System
    priority: 0
    fields:
      - field: name
        type: 1
      - field: descr
        type: 1
      - field: uptime
        type: 0
      - field: numUsers
        type: 0
      - field: processes
        type: 0
      - field: location
        type: 1
      - field: memory
        type: 0
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      timeout: ^_^timeout^_^
      community: ^_^community^_^
      version: ^_^snmpVersion^_^
      operation: get
      oids:
        name: 1.3.6.1.2.1.1.5.0
        descr: 1.3.6.1.2.1.1.1.0
        uptime: 1.3.6.1.2.1.25.1.1.0
        numUsers: 1.3.6.1.2.1.25.1.5.0
        processes: 1.3.6.1.2.1.25.1.6.0
        location: 1.3.6.1.2.1.1.6.0
        memory: 1.3.6.1.2.1.25.2.2.0

alerts:
  - key: 'windows_unavailable'
    name: 'OS Windows实例不可用'
    type: 'realtime_metric'
    metric: 'windows_server_up'
    operator: '=='
    threshold: 0
    level: 'critical'
    period: 60
    times: 1
    mode: 'core'
    enabled: true
    expr: 'windows_server_up == 0'
    template: '实例不可用'
  - key: 'windows_processes_high'
    name: 'OS Windows进程数偏高'
    type: 'periodic_metric'
    metric: 'processes'
    operator: '>'
    threshold: 300
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'processes > 300'
    template: '进程数偏高'
  - key: 'windows_processes_critical'
    name: 'OS Windows进程数过高'
    type: 'periodic_metric'
    metric: 'processes'
    operator: '>'
    threshold: 500
    level: 'critical'
    period: 180
    times: 1
    mode: 'core'
    enabled: true
    expr: 'processes > 500'
    template: '进程数过高'
  - key: 'windows_users_missing'
    name: 'OS Windows在线用户为0'
    type: 'periodic_metric'
    metric: 'numUsers'
    operator: '<'
    threshold: 1
    level: 'warning'
    period: 600
    times: 2
    mode: 'extended'
    enabled: false
    expr: 'numUsers < 1'
    template: '在线用户为0'
  - key: 'windows_memory_low'
    name: 'OS Windows物理内存容量偏低'
    type: 'periodic_metric'
    metric: 'memory'
    operator: '<'
    threshold: 1048576
    level: 'warning'
    period: 1800
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'memory < 1048576'
    template: '物理内存容量偏低'
  - key: 'windows_uptime_short'
    name: 'OS Windows运行时长过短'
    type: 'periodic_metric'
    metric: 'uptime'
    operator: '<'
    threshold: 60000
    level: 'warning'
    period: 600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'uptime < 60000'
    template: '运行时长过短'
  - key: 'windows_descr_missing'
    name: 'OS Windows系统描述采集缺失'
    type: 'periodic_metric'
    metric: 'descr'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 3600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'descr == '''''
    template: '系统描述采集缺失'
  - key: 'windows_hostname_missing'
    name: 'OS Windows主机名采集缺失'
    type: 'periodic_metric'
    metric: 'name'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 1800
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'name == '''''
    template: '主机名采集缺失'
  - key: 'windows_location_missing'
    name: 'OS Windows位置信息未配置'
    type: 'periodic_metric'
    metric: 'location'
    operator: '=='
    threshold: 0
    level: 'info'
    period: 3600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'location == '''''
    template: '位置信息未配置'
  - key: 'windows_uptime_reset'
    name: 'OS Windows疑似重启'
    type: 'periodic_metric'
    metric: 'uptime'
    operator: '<'
    threshold: 3600000
    level: 'warning'
    period: 600
    times: 1
    mode: 'core'
    enabled: true
    expr: 'uptime < 3600000'
    template: '疑似重启'
  - key: 'windows_processes_zero'
    name: 'OS Windows进程数异常为0'
    type: 'periodic_metric'
    metric: 'processes'
    operator: '<='
    threshold: 0
    level: 'warning'
    period: 900
    times: 2
    mode: 'extended'
    enabled: false
    expr: 'processes <= 0'
    template: '进程数异常为0'
