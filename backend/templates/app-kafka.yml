alerts:
  - key: 'kafka_unavailable'
    name: 'Kafka实例不可用'
    type: 'realtime_metric'
    metric: 'kafka_server_up'
    operator: '=='
    threshold: 0
    level: 'critical'
    period: 60
    times: 1
    mode: 'core'
    enabled: true
    expr: 'kafka_server_up == 0'
    template: '实例不可用'
  - key: 'kafka_controller_missing'
    name: 'Kafka无活跃控制器'
    type: 'realtime_metric'
    metric: 'ActiveControllerCount'
    operator: '<'
    threshold: 1
    level: 'critical'
    period: 60
    times: 1
    mode: 'core'
    enabled: true
    expr: 'ActiveControllerCount < 1'
    template: '无活跃控制器'
  - key: 'kafka_broker_drop'
    name: 'Kafka活跃Broker数量偏少'
    type: 'periodic_metric'
    metric: 'ActiveBrokerCount'
    operator: '<'
    threshold: 3
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'ActiveBrokerCount < 3'
    template: '活跃Broker数量偏少'
  - key: 'kafka_offline_partitions'
    name: 'Kafka存在离线分区'
    type: 'realtime_metric'
    metric: 'OfflinePartitionsCount'
    operator: '>'
    threshold: 0
    level: 'critical'
    period: 60
    times: 1
    mode: 'core'
    enabled: true
    expr: 'OfflinePartitionsCount > 0'
    template: '存在离线分区'
  - key: 'kafka_replica_imbalance'
    name: 'Kafka副本不平衡偏高'
    type: 'periodic_metric'
    metric: 'PreferredReplicaImbalanceCount'
    operator: '>'
    threshold: 10
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'PreferredReplicaImbalanceCount > 10'
    template: '副本不平衡偏高'
  - key: 'kafka_fenced_brokers'
    name: 'Kafka存在被隔离Broker'
    type: 'realtime_metric'
    metric: 'FencedBrokerCount'
    operator: '>'
    threshold: 0
    level: 'critical'
    period: 60
    times: 1
    mode: 'core'
    enabled: true
    expr: 'FencedBrokerCount > 0'
    template: '存在被隔离Broker'
  - key: 'kafka_delete_topics_pending'
    name: 'Kafka待删除主题过多'
    type: 'periodic_metric'
    metric: 'TopicsToDeleteCount'
    operator: '>'
    threshold: 5
    level: 'warning'
    period: 600
    times: 2
    mode: 'extended'
    enabled: false
    expr: 'TopicsToDeleteCount > 5'
    template: '待删除主题过多'
  - key: 'kafka_delete_replicas_pending'
    name: 'Kafka待删除副本过多'
    type: 'periodic_metric'
    metric: 'ReplicasToDeleteCount'
    operator: '>'
    threshold: 10
    level: 'warning'
    period: 600
    times: 2
    mode: 'extended'
    enabled: false
    expr: 'ReplicasToDeleteCount > 10'
    template: '待删除副本过多'
  - key: 'kafka_global_topics_high'
    name: 'Kafka主题数量偏高'
    type: 'periodic_metric'
    metric: 'GlobalTopicCount'
    operator: '>'
    threshold: 1000
    level: 'warning'
    period: 1800
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'GlobalTopicCount > 1000'
    template: '主题数量偏高'
  - key: 'kafka_global_partitions_high'
    name: 'Kafka分区数量偏高'
    type: 'periodic_metric'
    metric: 'GlobalPartitionCount'
    operator: '>'
    threshold: 10000
    level: 'warning'
    period: 1800
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'GlobalPartitionCount > 10000'
    template: '分区数量偏高'
  - key: 'kafka_jvm_restart'
    name: 'Kafka JVM运行时长过短'
    type: 'periodic_metric'
    metric: 'Uptime'
    operator: '<'
    threshold: 3600000
    level: 'warning'
    period: 600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'Uptime < 3600000'
    template: 'JVM运行时长过短'
