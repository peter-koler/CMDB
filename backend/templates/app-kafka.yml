      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: ^_^path^_^
      method: POST
      headers.Content-Type: application/json
      headers.Accept: application/json
      body: '{"type":"read","mbean":"kafka.controller:type=KafkaController,name=ActiveControllerCount","attribute":"Value"}'
      parseType: jsonPath
      parseScript: $
      authorization.basicAuthUsername: ^_^username^_^
      authorization.basicAuthPassword: ^_^password^_^
  - name: kafka_controller_offline_partitions_count
    i18n:
      zh-CN: Kafka离线分区数量
