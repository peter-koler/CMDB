alerts:
  - key: 'rockylinux_unavailable'
    name: 'OS Rocky Linux实例不可用'
    type: 'realtime_metric'
    metric: 'rockylinux_server_up'
    operator: '=='
    threshold: 0
    level: 'critical'
    period: 60
    times: 1
    mode: 'core'
    enabled: true
    expr: 'rockylinux_server_up == 0'
    template: '实例不可用'
  - key: 'rockylinux_load1_high'
    name: 'OS Rocky Linux1分钟负载偏高'
    type: 'periodic_metric'
    metric: 'load1'
    operator: '>'
    threshold: 4
    level: 'warning'
    period: 180
    times: 2
    mode: 'core'
    enabled: true
    expr: '(cpu_cores > 0) && (load1 > cpu_cores * 4)'
    template: '1分钟负载偏高'
  - key: 'rockylinux_load1_critical'
    name: 'OS Rocky Linux1分钟负载过高'
    type: 'periodic_metric'
    metric: 'load1'
    operator: '>'
    threshold: 8
    level: 'critical'
    period: 120
    times: 1
    mode: 'core'
    enabled: true
    expr: '(cpu_cores > 0) && (load1 > cpu_cores * 8)'
    template: '1分钟负载过高'
  - key: 'rockylinux_load5_high'
    name: 'OS Rocky Linux5分钟负载偏高'
    type: 'periodic_metric'
    metric: 'load5'
    operator: '>'
    threshold: 4
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: '(cpu_cores > 0) && (load5 > cpu_cores * 4)'
    template: '5分钟负载偏高'
  - key: 'rockylinux_mem_usage_high'
    name: 'OS Rocky Linux内存使用率偏高'
    type: 'periodic_metric'
    metric: 'mem_used_pct'
    operator: '>'
    threshold: 80
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'mem_used_pct > 80'
    template: '内存使用率偏高'
  - key: 'rockylinux_mem_usage_critical'
    name: 'OS Rocky Linux内存使用率过高'
    type: 'periodic_metric'
    metric: 'mem_used_pct'
    operator: '>'
    threshold: 90
    level: 'critical'
    period: 300
    times: 1
    mode: 'core'
    enabled: true
    expr: 'mem_used_pct > 90'
    template: '内存使用率过高'
  - key: 'rockylinux_mem_available_low'
    name: 'OS Rocky Linux可用内存不足'
    type: 'periodic_metric'
    metric: 'memavailable_kb'
    operator: '<'
    threshold: 524288
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'memavailable_kb < 524288'
    template: '可用内存不足'
  - key: 'rockylinux_uptime_short'
    name: 'OS Rocky Linux运行时长过短'
    type: 'periodic_metric'
    metric: 'uptime_s'
    operator: '<'
    threshold: 1800
    level: 'warning'
    period: 600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'uptime_s < 1800'
    template: '运行时长过短'
  - key: 'rockylinux_kernel_release_missing'
    name: 'OS Rocky Linux内核版本采集缺失'
    type: 'periodic_metric'
    metric: 'kernel_release'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 3600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'kernel_release == '''''
    template: '内核版本采集缺失'
  - key: 'rockylinux_hostname_missing'
    name: 'OS Rocky Linux主机名采集缺失'
    type: 'periodic_metric'
    metric: 'hostname'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 1800
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'hostname == '''''
    template: '主机名采集缺失'
  - key: 'rockylinux_load15_high'
    name: 'OS Rocky Linux15分钟负载持续偏高'
    type: 'periodic_metric'
    metric: 'load15'
    operator: '>'
    threshold: 4
    level: 'warning'
    period: 600
    times: 2
    mode: 'extended'
    enabled: false
    expr: '(cpu_cores > 0) && (load15 > cpu_cores * 4)'
    template: '15分钟负载持续偏高'
