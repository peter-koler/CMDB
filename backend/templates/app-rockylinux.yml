# The monitoring type category：service-application service monitoring db-database monitoring custom-custom monitoring os-operating system monitoring
category: os
# The monitoring type eg: linux windows tomcat mysql aws...
app: rockylinux
# The monitoring i18n name
name:
  zh-CN: Rocky Linux
  en-US: Rocky Linux
  ja-JP: Rocky Linux
# The description and help of this monitoring type
help:
  zh-CN: Hertzbeat 使用 <a class='help_module_content' href='https://hertzbeat.apache.org/docs/advanced/extend-ssh'> SSH 协议</a> 对 Rocky 操作系统的通用性能指标 (系统信息、CPU、内存、磁盘、网卡、文件系统、TOP资源进程等) 进行采集监控。<br>您可以点击“<i>新建 Rocky</i>”并配置HOST端口账户等相关参数进行添加，支持SSH账户密码或密钥认证。或者选择“<i>更多操作</i>”，导入已有配置。
  en-US: HertzBeat uses <a class='help_module_content' href='https://hertzbeat.apache.org/docs/advanced/extend-ssh'> SSH protocol</a> to monitors Rocky operating system's general performance metrics such as cpu, memory, disk, basic, interface, disk_free, top_process etc. <br>You can click the "<i>New Rocky</i>" and config host port and other related params to add, auth support password or secretKey. Or import an existing setup through the "<i>More Actions</i>" menu.
  zh-TW: Hertzbeat 使用 <a class='help_module_content' href='https://hertzbeat.apache.org/docs/advanced/extend-ssh'> SSH 协议</a> 對 Rocky 操作系统的通用性能指標 (系統信息、CPU、內存、磁盤、網卡、文件系統、TOP資源進程等) 進行採集監控。<br>您可以點擊“<i>新建 Rocky</i>”並配置HOST端口賬戶等相關參數進行添加，支持SSH賬戶密碼或密鑰認證。或者選擇“<i>更多操作</i>”，導入已有配寘。
  ja-JP: Hertzbeat は <a class='help_module_content' href='https://hertzbeat.apache.org/docs/advanced/extend-ssh'> SSHプロトコルを介して</a> Rockyオーエスの一般的なパフォーマンスのメトリクスを監視します。<br>「<i>新規 Rocky</i>」をクリックしてホストなどのパラメタを設定した後、新規することができます。SSHまたはキー認証をサポートします。
helpLink:
  zh-CN: https://hertzbeat.apache.org/zh-cn/docs/help/rockylinux
  en-US: https://hertzbeat.apache.org/docs/help/rockylinux
# Input params define for monitoring(render web ui by the definition)
params:
  # field-param field key
  - field: host
    # name-param field display i18n name
    name:
      zh-CN: 目标Host
      en-US: Target Host
      ja-JP: 目標ホスト
    # type-param field type(most mapping the html input type)
    type: host
    # required-true or false
    required: true
  # field-param field key
  - field: port
    # name-param field display i18n name
    name:
      zh-CN: 端口
      en-US: Port
      ja-JP: ポート
    # type-param field type(most mapping the html input type)
    type: number
    # when type is number, range is required
    range: '[0,65535]'
    # required-true or false
    required: true
    # default value
    defaultValue: 22
  # field-param field key
  - field: timeout
    # name-param field display i18n name
    name:
      zh-CN: 超时时间(ms)
      en-US: Timeout(ms)
      ja-JP: タイムアウト（ｍｓ）
    # type-param field type(most mapping the html input type)
    type: number
    # when type is number, range is required
    range: '[400,200000]'
    # required-true or false
    required: false
    # default value
    defaultValue: 6000
  # field-param field key
  - field: reuseConnection
    # name-param field display i18n name
    name:
      zh-CN: 复用连接
      en-US: Reuse Connection
      ja-JP: 接続再利用
    # type-param field type(most mapping the html input type)
    type: boolean
    # required-true or false
    required: true
    defaultValue: true
  # field-param field key
  - field: useProxy
    # name-param field display i18n name
    name:
      zh-CN: 使用代理
      en-US: Use Proxy Connection
      ja-JP: プロキシ接続利用
    # type-param field type(most mapping the html input type)
    type: boolean
    # required-true or false
    required: true
    defaultValue: false
  # field-param field key
  - field: username
    # name-param field display i18n name
    name:
      zh-CN: 用户名
      en-US: Username
      ja-JP: ユーザー名
    # type-param field type(most mapping the html input type)
    type: text
    # when type is text, use limit to limit string length
    limit: 50
    # required-true or false
    required: true
  # field-param field key
  - field: password
    # name-param field display i18n name
    name:
      zh-CN: 密码
      en-US: Password
      ja-JP: パスワード
    # type-param field type(most mapping the html input tag)
    type: password
    # required-true or false
    required: false
  # field-param field key
  - field: privateKey
    # name-param field display i18n name
    name:
      zh-CN: 私钥
      en-US: PrivateKey
      ja-JP: 秘密鍵
    # type-param field type(most mapping the html input type)
    type: textarea
    placeholder: -----BEGIN RSA PRIVATE KEY-----
    # required-true or false
    required: false
    # hide param-true or false
    hide: true
  # field-param field key
  - field: privateKeyPassphrase
    # name-param field display i18n name
    name:
      zh-CN: 密钥短语
      en-US: PrivateKey PassPhrase
      ja-JP: 秘密鍵フレーズ
    # type-param field type(most mapping the html input type)
    type: password
    # required-true or false
    required: false
    # hide param-true or false
    hide: true
  # field-param field key
  - field: proxyHost
    # name-param field display i18n name
    name:
      zh-CN: 代理主机
      en-US: Proxy Host
      ja-JP: プロキシホスト
    # type-param field type(most mapping the html input type)
    type: text
    # required-true or false
    required: false
    # hide param-true or false
    hide: true
  - field: proxyPort
    # name-param field display i18n name
    name:
      zh-CN: 代理端口
      en-US: Proxy Port
      ja-JP: プロキシポート
    # type-param field type(most mapping the html input type)
    type: number
    # when type is number, range is required
    range: '[0,65535]'
    # required-true or false
    required: false
    # hide param-true or false
    hide: true
    # default value
    defaultValue: 22
  # field-param field key
  - field: proxyUsername
    # name-param field display i18n name
    name:
      zh-CN: 代理用户名
      en-US: Proxy Username
      ja-JP: プロキシユーザー名
    # type-param field type(most mapping the html input type)
    type: text
    # when type is text, use limit to limit string length
    limit: 50
    # required-true or false
    required: false
    # hide param-true or false
    hide: true
  # field-param field key
  - field: proxyPassword
    # name-param field display i18n name
    name:
      zh-CN: 代理密码
      en-US: Proxy Password
      ja-JP: プロキシパスワード
    # type-param field type(most mapping the html input tag)
    type: password
    # required-true or false
    required: false
    # hide param-true or false
    hide: true
  # field-param field key
  - field: proxyPrivateKey
    # name-param field display i18n name
    name:
      zh-CN: 代理主机私钥
      en-US: proxyPrivateKey
      ja-JP: プロキシ秘密鍵
    # type-param field type(most mapping the html input type)
    type: textarea
    placeholder: -----BEGIN RSA PRIVATE KEY-----
    # required-true or false
    required: false
    # hide param-true or false
    hide: true
# collect metrics config list
metrics:
  # metrics - basic, inner monitoring metrics (responseTime - response time)
  - name: basic
    i18n:
      zh-CN: 系统基本信息
      en-US: Basic Info
      ja-JP: システム基礎情報
    # metrics scheduling priority(0->127)->(high->low), metrics with the same priority will be scheduled in parallel
    # priority 0's metrics is availability metrics, it will be scheduled first, only availability metrics collect success will the scheduling continue
    priority: 0
    # collect metrics content
    fields:
      # field-metric name, type-metric type(0-number,1-string), unit-metric unit('%','ms','MB'), label-whether it is a metrics label field
      - field: hostname
        type: 1
        label: true
        i18n:
          zh-CN: 主机名称
          en-US: Host Name
          ja-JP: ホスト名
      - field: version
        type: 1
        i18n:
          zh-CN: 操作系统版本
          en-US: System Version
          ja-JP: システムバージョン
      - field: uptime
        type: 1
        i18n:
          zh-CN: 启动时间
          en-US: Uptime
          ja-JP: アップタイム
    # the protocol used for monitoring, eg: sql, ssh, http, telnet, wmi, snmp, sdk
    protocol: ssh
    # the config content when protocol is ssh
    ssh:
      # ssh host: ipv4 ipv6 domain
      host: ^_^host^_^
      # ssh port
      port: ^_^port^_^
      # ssh username
      username: ^_^username^_^
      # ssh password
      password: ^_^password^_^
      # ssh private key
      privateKey: ^_^privateKey^_^
      # ssh private key passphrase
      privateKeyPassphrase: ^_^privateKeyPassphrase^_^
      timeout: ^_^timeout^_^
      reuseConnection: ^_^reuseConnection^_^
      # whether to use proxy server for ssh connection
      useProxy: ^_^useProxy^_^
      # ssh proxy host: ipv4 domain
      proxyHost: ^_^proxyHost^_^
      # ssh proxy port
      proxyPort: ^_^proxyPort^_^
      # ssh proxy username
      proxyUsername: ^_^proxyUsername^_^
      # ssh proxy password
      proxyPassword: ^_^proxyPassword^_^
      # ssh proxy private key
      proxyPrivateKey: ^_^proxyPrivateKey^_^
      # ssh run collect script
      script: printf 'version hostname uptime\n'; version=$(uname -r 2>/dev/null || echo unknown); hostname_v=$(hostname 2>/dev/null || uname -n 2>/dev/null || echo unknown); uptime_v=$(uptime -p 2>/dev/null | tr ' ' '_'); [ -z "$uptime_v" ] && uptime_v=$(awk '{print "up_"int($1)"s"}' /proc/uptime 2>/dev/null); [ -z "$uptime_v" ] && uptime_v=up_unknown; printf '%s %s %s\n' "$version" "$hostname_v" "$uptime_v"
      # ssh response data parse type: oneRow, multiRow
      parseType: multiRow

  - name: cpu
    i18n:
      zh-CN: CPU 信息
      en-US: CPU Info
      ja-JP: CPU情報
    priority: 1
    fields:
      - field: info
        type: 1
        i18n:
          zh-CN: 型号
          en-US: Info
          ja-JP: バージョン
      - field: cores
        type: 1
        i18n:
          zh-CN: 核数
          en-US: Cores
          ja-JP: コア数
      - field: interrupt
        type: 0
        i18n:
          zh-CN: 中断数
          en-US: Interrupt
          ja-JP: 割り込み数
      - field: load
        type: 1
        i18n:
          zh-CN: 负载
          en-US: Load
          ja-JP: ロード
      - field: context_switch
        type: 0
        i18n:
          zh-CN: 上下文切换
          en-US: Context Switch
          ja-JP: コンテキストスイッチ
      - field: usage
        type: 0
        unit: '%'
        i18n:
          zh-CN: 使用率
          en-US: Usage
          ja-JP: 使用率
    # (optional)metrics field alias name, it is used as an alias field to map and convert the collected data and metrics field
    aliasFields:
      - info
      - cores
      - load
      - interrupt
      - context_switch
      - idle
    # mapping and conversion expressions, use these and aliasField above to calculate metrics value
    # eg: cores=core1+core2, usage=usage, waitTime=allTime-runningTime
    calculates:
      - info=info
      - cores=cores
      - load=load
      - interrupt=interrupt
      - context_switch=context_switch
      - usage=100-idle
    protocol: ssh
    ssh:
      host: ^_^host^_^
      port: ^_^port^_^
      username: ^_^username^_^
      password: ^_^password^_^
      privateKey: ^_^privateKey^_^
      privateKeyPassphrase: ^_^privateKeyPassphrase^_^
      timeout: ^_^timeout^_^
      reuseConnection: ^_^reuseConnection^_^
      # whether to use proxy server for ssh connection
      useProxy: ^_^useProxy^_^
      # ssh proxy host: ipv4 domain
      proxyHost: ^_^proxyHost^_^
      # ssh proxy port
      proxyPort: ^_^proxyPort^_^
      # ssh proxy username
      proxyUsername: ^_^proxyUsername^_^
      # ssh proxy password
      proxyPassword: ^_^proxyPassword^_^
      # ssh proxy private key
      proxyPrivateKey: ^_^proxyPrivateKey^_^
      script: printf 'cores load interrupt context_switch idle info\n'; cores=$(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN 2>/dev/null || awk '/^processor/{c++} END{print c+0}' /proc/cpuinfo 2>/dev/null); load=$(awk '{print $1}' /proc/loadavg 2>/dev/null); [ -z "$load" ] && load=$(uptime 2>/dev/null | sed 's/,/ /g' | awk '{print $(NF-2)}'); interrupt=$(awk '/^intr /{print $2; exit}' /proc/stat 2>/dev/null); context_switch=$(awk '/^ctxt /{print $2; exit}' /proc/stat 2>/dev/null); read _ a b c d e f g h i j < /proc/stat 2>/dev/null; total=$((a+b+c+d+e+f+g+h)); if [ "$total" -gt 0 ] 2>/dev/null; then idle=$(awk -v d="$d" -v t="$total" 'BEGIN{printf "%.2f", (d/t)*100}'); else idle=0; fi; info=$(LANG=C lscpu 2>/dev/null | sed -n 's/^Model name:[[:space:]]*//p' | head -n 1); [ -z "$info" ] && info=$(awk -F':' '/model name/{print $2; exit}' /proc/cpuinfo 2>/dev/null | sed 's/^[[:space:]]*//'); [ -z "$cores" ] && cores=0; [ -z "$load" ] && load=0; [ -z "$interrupt" ] && interrupt=0; [ -z "$context_switch" ] && context_switch=0; [ -z "$idle" ] && idle=0; [ -z "$info" ] && info=$(uname -m 2>/dev/null || echo unknown); printf '%s %s %s %s %s %s\n' "$cores" "$load" "$interrupt" "$context_switch" "$idle" "$info"
      parseType: oneRow

  - name: memory
    i18n:
      zh-CN: 内存信息
      en-US: Memory Info
      ja-JP: メモリ情報
    priority: 2
    fields:
      - field: total
        type: 1
        unit: Mb
        i18n:
          zh-CN: 总内存容量
          en-US: Total Memory
          ja-JP: メモリ容量
      - field: used
        type: 0
        unit: Mb
        i18n:
          zh-CN: 用户程序内存量
          en-US: User Program Memory
          ja-JP: ユーザープログラムメモリ
      - field: free
        type: 0
        unit: Mb
        i18n:
          zh-CN: 空闲内存容量
          en-US: Free Memory
          ja-JP: 空きメモリ
      - field: buff_cache
        type: 0
        unit: Mb
        i18n:
          zh-CN: 缓存占用内存
          en-US: Buff Cache Memory
          ja-JP: バッファメモリ
      - field: available
        type: 0
        unit: Mb
        i18n:
          zh-CN: 剩余可用内存
          en-US: Available Memory
          ja-JP: 使用可能のメモリ
      - field: usage
        type: 0
        unit: '%'
        i18n:
          zh-CN: 内存使用率
          en-US: Memory Usage
          ja-JP: メモリ使用率
    aliasFields:
      - total
      - used
      - free
      - buff_cache
      - available
    calculates:
      - total=total
      - used=used
      - free=free
      - buff_cache=buff_cache
      - available=available
      - usage=(used / total) * 100
    protocol: ssh
    ssh:
      host: ^_^host^_^
      port: ^_^port^_^
      username: ^_^username^_^
      password: ^_^password^_^
      privateKey: ^_^privateKey^_^
      privateKeyPassphrase: ^_^privateKeyPassphrase^_^
      timeout: ^_^timeout^_^
      reuseConnection: ^_^reuseConnection^_^
      # whether to use proxy server for ssh connection
      useProxy: ^_^useProxy^_^
      # ssh proxy host: ipv4 domain
      proxyHost: ^_^proxyHost^_^
      # ssh proxy port
      proxyPort: ^_^proxyPort^_^
      # ssh proxy username
      proxyUsername: ^_^proxyUsername^_^
      # ssh proxy password
      proxyPassword: ^_^proxyPassword^_^
      # ssh proxy private key
      proxyPrivateKey: ^_^proxyPrivateKey^_^
      script: printf 'total used free buff_cache available\n'; total=$(awk '/MemTotal/{print int($2/1024)}' /proc/meminfo 2>/dev/null); freev=$(awk '/MemFree/{print int($2/1024)}' /proc/meminfo 2>/dev/null); buffers=$(awk '/^Buffers:/{print int($2/1024)}' /proc/meminfo 2>/dev/null); cached=$(awk '/^Cached:/{print int($2/1024)}' /proc/meminfo 2>/dev/null); sreclaim=$(awk '/^SReclaimable:/{print int($2/1024)}' /proc/meminfo 2>/dev/null); available=$(awk '/MemAvailable/{print int($2/1024)}' /proc/meminfo 2>/dev/null); [ -z "$total" ] && total=0; [ -z "$freev" ] && freev=0; [ -z "$buffers" ] && buffers=0; [ -z "$cached" ] && cached=0; [ -z "$sreclaim" ] && sreclaim=0; [ -z "$available" ] && available=$((freev+buffers+cached+sreclaim)); buff_cache=$((buffers+cached+sreclaim)); used=$((total-freev-buff_cache)); [ "$used" -lt 0 ] && used=0; printf '%s %s %s %s %s\n' "$total" "$used" "$freev" "$buff_cache" "$available"
      parseType: multiRow

  - name: disk
    i18n:
      zh-CN: 磁盘信息
      en-US: Disk Info
      ja-JP: ディスク情報
    priority: 3
    fields:
      - field: disk_num
        type: 1
        i18n:
          zh-CN: 磁盘总数
          en-US: Disk Num
          ja-JP: ディスク番号
      - field: partition_num
        type: 1
        i18n:
          zh-CN: 分区总数
          en-US: Partition Num
          ja-JP: パーティション
      - field: block_write
        type: 0
        i18n:
          zh-CN: 写磁盘块数
          en-US: Block Write
          ja-JP: 書き込みディスクブロック数
      - field: block_read
        type: 0
        i18n:
          zh-CN: 读磁盘块数
          en-US: Block Read
          ja-JP: 読み取りブロック数
      - field: write_rate
        type: 0
        unit: iops
        i18n:
          zh-CN: 磁盘写速率
          en-US: Write Rate
          ja-JP: ディスク書き込み速度
    protocol: ssh
    ssh:
      host: ^_^host^_^
      port: ^_^port^_^
      username: ^_^username^_^
      password: ^_^password^_^
      privateKey: ^_^privateKey^_^
      privateKeyPassphrase: ^_^privateKeyPassphrase^_^
      timeout: ^_^timeout^_^
      reuseConnection: ^_^reuseConnection^_^
      # whether to use proxy server for ssh connection
      useProxy: ^_^useProxy^_^
      # ssh proxy host: ipv4 domain
      proxyHost: ^_^proxyHost^_^
      # ssh proxy port
      proxyPort: ^_^proxyPort^_^
      # ssh proxy username
      proxyUsername: ^_^proxyUsername^_^
      # ssh proxy password
      proxyPassword: ^_^proxyPassword^_^
      # ssh proxy private key
      proxyPrivateKey: ^_^proxyPrivateKey^_^
      script: printf 'disk_num partition_num block_write block_read write_rate\n'; disk_num=$(lsblk -dn -o TYPE 2>/dev/null | awk '$1=="disk"{c++} END{print c+0}'); partition_num=$(lsblk -dn -o TYPE 2>/dev/null | awk '$1=="part"{c++} END{print c+0}'); [ -z "$disk_num" ] && disk_num=$(ls -1 /sys/block 2>/dev/null | grep -Ev '^(loop|ram|fd)$' | wc -l | tr -d ' '); [ -z "$partition_num" ] && partition_num=0; block_read=$(awk '/^pgpgin /{print $2; exit}' /proc/vmstat 2>/dev/null); block_write=$(awk '/^pgpgout /{print $2; exit}' /proc/vmstat 2>/dev/null); if [ -z "$block_read" ] || [ -z "$block_write" ]; then set -- $(awk 'BEGIN{r=0;w=0} $3 ~ /^(sd|vd|xvd|nvme|hd)/ {r+=$6; w+=$10} END{print r+0, w+0}' /proc/diskstats 2>/dev/null); [ -z "$block_read" ] && block_read=$1; [ -z "$block_write" ] && block_write=$2; fi; [ -z "$block_read" ] && block_read=0; [ -z "$block_write" ] && block_write=0; [ -z "$disk_num" ] && disk_num=0; write_rate=$block_write; printf '%s %s %s %s %s\n' "$disk_num" "$partition_num" "$block_write" "$block_read" "$write_rate"
      parseType: oneRow

  - name: interface
    i18n:
      zh-CN: 网卡信息
      en-US: Interface Info
      ja-JP: ネットワークカード情報
    priority: 4
    fields:
      - field: interface_name
        type: 1
        label: true
        i18n:
          zh-CN: 网卡名称
          en-US: Interface Name
          ja-JP: ネットワークカード名
      - field: ip_address
        type: 1
        i18n:
          zh-CN: IP地址
          en-US: IP Address
          ja-JP: IPアドレス
      - field: mac_address
        type: 1
        i18n:
          zh-CN: MAC地址
          en-US: MAC Address
          ja-JP: MACアドレス
      - field: receive_bytes
        type: 0
        unit: Mb
        i18n:
          zh-CN: 入站数据流量
          en-US: Receive Bytes
          ja-JP: 受信されたバイト数
      - field: transmit_bytes
        type: 0
        unit: Mb
        i18n:
          zh-CN: 出站数据流量
          en-US: Transmit Bytes
          ja-JP: 転送されたバイト数
    units:
      - receive_bytes=B->MB
      - transmit_bytes=B->MB
    protocol: ssh
    ssh:
      host: ^_^host^_^
      port: ^_^port^_^
      username: ^_^username^_^
      password: ^_^password^_^
      privateKey: ^_^privateKey^_^
      privateKeyPassphrase: ^_^privateKeyPassphrase^_^
      timeout: ^_^timeout^_^
      reuseConnection: ^_^reuseConnection^_^
      # whether to use proxy server for ssh connection
      useProxy: ^_^useProxy^_^
      # ssh proxy host: ipv4 domain
      proxyHost: ^_^proxyHost^_^
      # ssh proxy port
      proxyPort: ^_^proxyPort^_^
      # ssh proxy username
      proxyUsername: ^_^proxyUsername^_^
      # ssh proxy password
      proxyPassword: ^_^proxyPassword^_^
      # ssh proxy private key
      proxyPrivateKey: ^_^proxyPrivateKey^_^
      script: printf 'interface_name ip_address mac_address receive_bytes transmit_bytes\n'; tail -n +3 /proc/net/dev 2>/dev/null | while read -r iface rest; do iface=${iface%:}; [ -z "$iface" ] && continue; set -- $rest; rx=$1; tx=$9; ip=$(ip -o -4 addr show dev "$iface" 2>/dev/null | awk '{print $4}' | head -n 1 | cut -d/ -f1); [ -z "$ip" ] && ip=$(ifconfig "$iface" 2>/dev/null | awk '/inet /{for(i=1;i<=NF;i++){if($i=="inet"){print $(i+1);exit} if(index($i,"addr:")==1){sub("addr:","",$i);print $i;exit}}}' | head -n 1); [ -z "$ip" ] && ip=-; mac=$(cat /sys/class/net/"$iface"/address 2>/dev/null | tr 'A-Z' 'a-z'); [ -z "$mac" ] && mac=$(ifconfig "$iface" 2>/dev/null | awk '/(ether|HWaddr)/{for(i=1;i<=NF;i++){if($i=="ether"||$i=="HWaddr"){print $(i+1);exit}}}' | tr 'A-Z' 'a-z' | head -n 1); [ -z "$mac" ] && mac=-; [ -z "$rx" ] && rx=0; [ -z "$tx" ] && tx=0; printf '%s %s %s %s %s\n' "$iface" "$ip" "$mac" "$rx" "$tx"; done
      parseType: multiRow

  - name: disk_free
    i18n:
      zh-CN: 文件系统
      en-US: Disk Free
      ja-JP: ファイルシステム
    priority: 5
    fields:
