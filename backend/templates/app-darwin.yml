category: os
app: darwin
name:
  zh-CN: Darwin操作系统
  en-US: OS Darwin
help:
  zh-CN: 使用 Arco Collector 的 SSH 协议采集主机基础、负载与内存指标，适用于统一主机监控基线。
  en-US: Collect host basic, load and memory metrics through Arco SSH protocol.
params:
  - field: host
    name:
      zh-CN: 目标 Host
      en-US: Target Host
    type: host
    required: true
  - field: port
    name:
      zh-CN: SSH端口
      en-US: SSH Port
    type: number
    range: '[0,65535]'
    required: true
    defaultValue: 22
  - field: username
    name:
      zh-CN: 用户名
      en-US: Username
    type: text
    required: true
    defaultValue: root
  - field: password
    name:
      zh-CN: 密码
      en-US: Password
    type: password
    required: false
  - field: privateKey
    name:
      zh-CN: 私钥
      en-US: Private Key
    type: text
    required: false
    hide: true
  - field: privateKeyPassphrase
    name:
      zh-CN: 私钥口令
      en-US: Private Key Passphrase
    type: password
    required: false
    hide: true
  - field: strictHostKeyChecking
    name:
      zh-CN: 严格主机校验
      en-US: Strict Host Key Checking
    type: boolean
    required: false
    defaultValue: false
  - field: knownHostsPath
    name:
      zh-CN: known_hosts路径
      en-US: known_hosts Path
    type: text
    required: false
    hide: true
    defaultValue: ~/.ssh/known_hosts
  - field: reuseConnection
    name:
      zh-CN: 复用连接
      en-US: Reuse Connection
    type: boolean
    required: false
    defaultValue: true
  - field: timeout
    name:
      zh-CN: 超时时间(ms)
      en-US: Timeout(ms)
    type: number
    range: '[0,100000]'
    required: false
    defaultValue: 6000
metrics:
  - name: system_basic
    i18n:
      zh-CN: 系统基础信息
      en-US: System Basic
    priority: 0
    fields:
      - field: hostname
        type: 1
      - field: goos
        type: 1
      - field: kernel_release
        type: 1
      - field: cpu_cores
        type: 0
      - field: uptime_s
        type: 0
    protocol: ssh
    ssh:
      host: ^_^host^_^
      port: ^_^port^_^
      username: ^_^username^_^
      password: ^_^password^_^
      privateKey: ^_^privateKey^_^
      privateKeyPassphrase: ^_^privateKeyPassphrase^_^
      strictHostKeyChecking: ^_^strictHostKeyChecking^_^
      knownHostsPath: ^_^knownHostsPath^_^
      reuseConnection: ^_^reuseConnection^_^
      timeout: ^_^timeout^_^
      script: 'echo "hostname kernel_release uptime_s cpu_cores"; echo "$(hostname) $(uname -r) $(( $(date +%s) - $(who -b 2>/dev/null | awk ''{print $3" "$4}'' | xargs -I{} date -d "{}" +%s 2>/dev/null || echo $(date +%s)) )) $(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 1)"'
      parseType: oneRow
  - name: load
    i18n:
      zh-CN: 系统负载
      en-US: Load
    priority: 1
    fields:
      - field: load1
        type: 0
      - field: load5
        type: 0
      - field: load15
        type: 0
      - field: cpu_cores
        type: 0
    protocol: ssh
    ssh:
      host: ^_^host^_^
      port: ^_^port^_^
      username: ^_^username^_^
      password: ^_^password^_^
      privateKey: ^_^privateKey^_^
      privateKeyPassphrase: ^_^privateKeyPassphrase^_^
      strictHostKeyChecking: ^_^strictHostKeyChecking^_^
      knownHostsPath: ^_^knownHostsPath^_^
      reuseConnection: ^_^reuseConnection^_^
      timeout: ^_^timeout^_^
      script: 'echo "load1 load5 load15 cpu_cores"; uptime | sed "s/,//g" | awk ''{for(i=NF-2;i<=NF;i++) printf "%s ", $i;} END{print ""}'' | awk ''{print $1, $2, $3}'' | xargs -I{} sh -c ''echo "{}" $(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 1)'''
      parseType: oneRow
  - name: memory
    i18n:
      zh-CN: 内存
      en-US: Memory
    priority: 1
    fields:
      - field: memtotal_kb
        type: 0
      - field: memavailable_kb
        type: 0
      - field: mem_used_pct
        type: 0
        unit: '%'
    protocol: ssh
    ssh:
      host: ^_^host^_^
      port: ^_^port^_^
      username: ^_^username^_^
      password: ^_^password^_^
      privateKey: ^_^privateKey^_^
      privateKeyPassphrase: ^_^privateKeyPassphrase^_^
      strictHostKeyChecking: ^_^strictHostKeyChecking^_^
      knownHostsPath: ^_^knownHostsPath^_^
      reuseConnection: ^_^reuseConnection^_^
      timeout: ^_^timeout^_^
      script: 'total_kb=$(awk "/MemTotal/ {print $2}" /proc/meminfo 2>/dev/null); avail_kb=$(awk "/MemAvailable/ {print $2}" /proc/meminfo 2>/dev/null); if [ -z "$total_kb" ]; then total_b=$(sysctl -n hw.memsize 2>/dev/null || sysctl -n hw.physmem 2>/dev/null || echo 0); total_kb=$((total_b/1024)); pagesize=$(sysctl -n hw.pagesize 2>/dev/null || echo 4096); free_p=$(vm_stat 2>/dev/null | awk "/Pages free/ {gsub(/\./, "", $3); print $3; exit}"); inact_p=$(vm_stat 2>/dev/null | awk "/Pages inactive/ {gsub(/\./, "", $3); print $3; exit}"); avail_kb=$(((free_p+inact_p)*pagesize/1024)); fi; [ -z "$total_kb" ] && total_kb=0; [ -z "$avail_kb" ] && avail_kb=0; used_pct=$(awk -v t="$total_kb" -v a="$avail_kb" ''BEGIN{if(t>0) printf "%.2f", ((t-a)/t)*100; else print "0"}''); echo "memtotal_kb memavailable_kb mem_used_pct"; echo "$total_kb $avail_kb $used_pct"'
      parseType: oneRow

alerts:
  - key: 'darwin_unavailable'
    name: 'OS Darwin实例不可用'
    type: 'realtime_metric'
    metric: 'darwin_server_up'
    operator: '=='
    threshold: 0
    level: 'critical'
    period: 60
    times: 1
    mode: 'core'
    enabled: true
    expr: 'darwin_server_up == 0'
    template: '实例不可用'
  - key: 'darwin_load1_high'
    name: 'OS Darwin1分钟负载偏高'
    type: 'periodic_metric'
    metric: 'load1'
    operator: '>'
    threshold: 2
    level: 'warning'
    period: 180
    times: 2
    mode: 'core'
    enabled: true
    expr: '(cpu_cores > 0) && (load1 > cpu_cores * 2)'
    template: '1分钟负载偏高'
  - key: 'darwin_load1_critical'
    name: 'OS Darwin1分钟负载过高'
    type: 'periodic_metric'
    metric: 'load1'
    operator: '>'
    threshold: 4
    level: 'critical'
    period: 120
    times: 1
    mode: 'core'
    enabled: true
    expr: '(cpu_cores > 0) && (load1 > cpu_cores * 4)'
    template: '1分钟负载过高'
  - key: 'darwin_load5_high'
    name: 'OS Darwin5分钟负载偏高'
    type: 'periodic_metric'
    metric: 'load5'
    operator: '>'
    threshold: 2
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: '(cpu_cores > 0) && (load5 > cpu_cores * 2)'
    template: '5分钟负载偏高'
  - key: 'darwin_mem_usage_high'
    name: 'OS Darwin内存使用率偏高'
    type: 'periodic_metric'
    metric: 'mem_used_pct'
    operator: '>'
    threshold: 80
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'mem_used_pct > 80'
    template: '内存使用率偏高'
  - key: 'darwin_mem_usage_critical'
    name: 'OS Darwin内存使用率过高'
    type: 'periodic_metric'
    metric: 'mem_used_pct'
    operator: '>'
    threshold: 90
    level: 'critical'
    period: 300
    times: 1
    mode: 'core'
    enabled: true
    expr: 'mem_used_pct > 90'
    template: '内存使用率过高'
  - key: 'darwin_mem_available_low'
    name: 'OS Darwin可用内存不足'
    type: 'periodic_metric'
    metric: 'memavailable_kb'
    operator: '<'
    threshold: 524288
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'memavailable_kb < 524288'
    template: '可用内存不足'
  - key: 'darwin_uptime_short'
    name: 'OS Darwin运行时长过短'
    type: 'periodic_metric'
    metric: 'uptime_s'
    operator: '<'
    threshold: 1800
    level: 'warning'
    period: 600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'uptime_s < 1800'
    template: '运行时长过短'
  - key: 'darwin_kernel_release_missing'
    name: 'OS Darwin内核版本采集缺失'
    type: 'periodic_metric'
    metric: 'kernel_release'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 3600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'kernel_release == '''''
    template: '内核版本采集缺失'
  - key: 'darwin_hostname_missing'
    name: 'OS Darwin主机名采集缺失'
    type: 'periodic_metric'
    metric: 'hostname'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 1800
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'hostname == '''''
    template: '主机名采集缺失'
  - key: 'darwin_load15_high'
    name: 'OS Darwin15分钟负载持续偏高'
    type: 'periodic_metric'
    metric: 'load15'
    operator: '>'
    threshold: 2
    level: 'warning'
    period: 600
    times: 2
    mode: 'extended'
    enabled: false
    expr: '(cpu_cores > 0) && (load15 > cpu_cores * 2)'
    template: '15分钟负载持续偏高'
