category: mid
app: kafka_client
name:
  zh-CN: Kafka消息系统（客户端）
  en-US: Kafka Message（Client）

help:
  zh-CN: HertzBeat 使用 <a href="https://hertzbeat.apache.org/zh-cn/docs/help/kafka_client">Kafka Admin Client</a> 对 Kafka 的通用指标进行采集监控。</span>
  en-US: HertzBeat uses <a href='https://hertzbeat.apache.org/docs/help/kafka_client'>Kafka Admin Client</a> to monitoring kafka general metrics. </span>
  zh-TW: HertzBeat 使用 <a href="https://hertzbeat.apache.org/zh-cn/docs/help/kafka_client">Kafka Admin Client</a> 對 Kafka 的通用指標進行采集監控。</span>

helpLink:
  zh-CN: https://hertzbeat.apache.org/zh-cn/docs/help/kafka_client
  en-US: https://hertzbeat.apache.org/docs/help/kafka_client

params:
  - field: host
    name:
      zh-CN: 目标Host
      en-US: Target Host
    type: host
    required: true
  - field: port
    name:
      zh-CN: 端口
      en-US: Port
    type: number
    range: '[0,65535]'
    required: true
    defaultValue: 9092
  - field: monitorInternalTopic
    name:
      zh-CN: 是否监控内部主题
      en-US: Monitor Internal Topic
    type: boolean
    required: true
    defaultValue: false

metrics:
  - name: topic_list
    i18n:
      zh-CN: 主题列表
      en-US: Topic List
    priority: 0
    fields:
      - field: TopicName
        type: 1
        i18n:
          zh-CN: 主题名称
          en-US: Topic Name
    protocol: kclient
    kclient:
      host: ^_^host^_^
      port: ^_^port^_^
      monitorInternalTopic: ^_^monitorInternalTopic^_^
      command: topic-list
  - name: topic_detail
    i18n:
      zh-CN: 主题详细信息
      en-US: Topic Detail Info
    priority: 1
    fields:
      - field: TopicName
        type: 1
        i18n:
          zh-CN: 主题名称
          en-US: Topic Name
      - field: PartitionNum
        type: 1
        i18n:
          zh-CN: 分区数量
          en-US: Partition Num
      - field: PartitionLeader
        type: 1
        i18n:
          zh-CN: 分区领导者
          en-US: Partition Leader
      - field: BrokerHost
        type: 1
        i18n:
          zh-CN: Broker主机
          en-US: Broker Host
      - field: BrokerPort
        type: 1
        i18n:
          zh-CN: Broker端口
          en-US: Broker Port
      - field: ReplicationFactorSize
        type: 1
        i18n:
          zh-CN: 复制因子大小
          en-US: Replication Factor Size
      - field: ReplicationFactor
        type: 1
        i18n:
          zh-CN: 复制因子
          en-US: Replication Factor
    protocol: kclient
    kclient:
      host: ^_^host^_^
      port: ^_^port^_^
      monitorInternalTopic: ^_^monitorInternalTopic^_^
      command: topic-describe
  - name: topic_offset
    i18n:
      zh-CN: 主题偏移量
      en-US: Topic Offset
    priority: 2
    # Kafka offset does not need to be obtained frequently, as getting it too quickly will affect performance
    interval: 300
    fields:
      - field: TopicName
        label: true
        type: 1
        i18n:
          zh-CN: 主题名称
          en-US: Topic Name
      - field: PartitionNum
        label: true
        type: 1
        i18n:
          zh-CN: 分区号
          en-US: Partition Num
      - field: earliest
        type: 0
        i18n:
          zh-CN: 最早偏移量
          en-US: Earliest Offset
      - field: latest
        type: 0
        i18n:
          zh-CN: 最新偏移量
          en-US: Latest Offset
    protocol: kclient
    kclient:
      host: ^_^host^_^
      port: ^_^port^_^
      monitorInternalTopic: ^_^monitorInternalTopic^_^
      command: topic-offset
  - name: consumer_detail
    i18n:
      zh-CN: 消费者组情况
      en-US: Consumer Detail Info
    priority: 3
    # Kafka offset does not need to be obtained frequently, as getting it too quickly will affect performance
    interval: 300
    fields:
      - field: GroupId
        label: true
        type: 1
        i18n:
          zh-CN: 消费者组ID
          en-US: Consumer Group ID
      - field: group_member_num
        type: 1
        i18n:
          zh-CN: 消费者实例数量
          en-US: Group Member Num
      - field: Topic
        label: true
        type: 1
        i18n:
          zh-CN: 订阅主题名称
          en-US: Subscribed Topic Name
      - field: offset_of_each_partition
        type: 1
        i18n:
          zh-CN: 各分区偏移量
          en-US: Offset of Each Partition
      - field: Lag
        type: 0
        i18n:
          zh-CN: 落后偏移量
          en-US: Total Lag
    protocol: kclient
    kclient:
      host: ^_^host^_^
      port: ^_^port^_^
      monitorInternalTopic: ^_^monitorInternalTopic^_^
      command: consumer-detail

alerts:
  - key: 'kafka_client_unavailable'
    name: 'Kafka客户端实例不可用'
    type: 'realtime_metric'
    metric: 'kafka_client_server_up'
    operator: '=='
    threshold: 0
    level: 'critical'
    period: 60
    times: 1
    mode: 'core'
    enabled: true
    expr: 'kafka_client_server_up == 0'
    template: '实例不可用'
  - key: 'kafka_client_topics_missing'
    name: 'Kafka主题数量异常偏少'
    type: 'periodic_metric'
    metric: 'TopicName'
    operator: '<'
    threshold: 1
    level: 'warning'
    period: 1800
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'row1_TopicName == '''''
    template: '主题数量异常偏少'
  - key: 'kafka_client_partition_small'
    name: 'Kafka主题分区配置偏小'
    type: 'periodic_metric'
    metric: 'PartitionNum'
    operator: '<'
    threshold: 3
    level: 'warning'
    period: 1800
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'PartitionNum < 3'
    template: '主题分区配置偏小'
  - key: 'kafka_client_replication_small'
    name: 'Kafka副本因子偏小'
    type: 'periodic_metric'
    metric: 'ReplicationFactorSize'
    operator: '<'
    threshold: 2
    level: 'warning'
    period: 1800
    times: 1
    mode: 'core'
    enabled: true
    expr: 'ReplicationFactorSize < 2'
    template: '副本因子偏小'
  - key: 'kafka_client_lag_high'
    name: 'Kafka消费组积压偏高'
    type: 'periodic_metric'
    metric: 'Lag'
    operator: '>'
    threshold: 10000
    level: 'warning'
    period: 300
    times: 2
    mode: 'core'
    enabled: true
    expr: 'Lag > 10000'
    template: '消费组积压偏高'
  - key: 'kafka_client_lag_critical'
    name: 'Kafka消费组积压过高'
    type: 'periodic_metric'
    metric: 'Lag'
    operator: '>'
    threshold: 50000
    level: 'critical'
    period: 300
    times: 1
    mode: 'core'
    enabled: true
    expr: 'Lag > 50000'
    template: '消费组积压过高'
  - key: 'kafka_client_consumer_missing'
    name: 'Kafka消费组无成员'
    type: 'periodic_metric'
    metric: 'group_member_num'
    operator: '<'
    threshold: 1
    level: 'critical'
    period: 300
    times: 1
    mode: 'core'
    enabled: true
    expr: 'group_member_num < 1'
    template: '消费组无成员'
  - key: 'kafka_client_consumer_small'
    name: 'Kafka消费组成员过少'
    type: 'periodic_metric'
    metric: 'group_member_num'
    operator: '<'
    threshold: 2
    level: 'warning'
    period: 300
    times: 2
    mode: 'extended'
    enabled: false
    expr: 'group_member_num < 2'
    template: '消费组成员过少'
  - key: 'kafka_client_latest_offset_high'
    name: 'Kafka最新偏移量增长过快'
    type: 'periodic_metric'
    metric: 'latest'
    operator: '>'
    threshold: 10000000
    level: 'warning'
    period: 600
    times: 2
    mode: 'extended'
    enabled: false
    expr: 'latest > 10000000'
    template: '最新偏移量增长过快'
  - key: 'kafka_client_partition_offset_gap'
    name: 'Kafka分区偏移跨度过大'
    type: 'periodic_metric'
    metric: 'latest'
    operator: '>'
    threshold: 1000000
    level: 'warning'
    period: 600
    times: 2
    mode: 'extended'
    enabled: false
    expr: '(latest - earliest) > 1000000'
    template: '分区偏移跨度过大'
  - key: 'kafka_client_topic_name_empty'
    name: 'Kafka主题列表采集为空'
    type: 'realtime_metric'
    metric: 'TopicName'
    operator: '=='
    threshold: 0
    level: 'warning'
    period: 600
    times: 1
    mode: 'extended'
    enabled: false
    expr: 'TopicName == '''''
    template: '主题列表采集为空'
