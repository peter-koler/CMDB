category: mid
app: kafka
name:
  zh-CN: Kafka消息系统
  en-US: Kafka Message
help:
  zh-CN: 基于 Jolokia HTTP 接口采集 Kafka 关键控制器与 JVM 指标。请确保 Broker 已启用 Jolokia Agent，并开放对应端口。
  en-US: Monitor Kafka controller and JVM metrics through Jolokia HTTP endpoint.
helpLink:
  zh-CN: https://hertzbeat.apache.org/zh-cn/docs/help/kafka
  en-US: https://hertzbeat.apache.org/docs/help/kafka
params:
  - field: host
    name:
      zh-CN: 目标 Host
      en-US: Target Host
    type: host
    required: true
  - field: port
    name:
      zh-CN: Jolokia 端口
      en-US: Jolokia Port
    type: number
    range: '[0,65535]'
    required: true
    defaultValue: 8778
  - field: path
    name:
      zh-CN: Jolokia 路径
      en-US: Jolokia Path
    type: text
    required: true
    defaultValue: /jolokia/
  - field: ssl
    name:
      zh-CN: 启用 HTTPS
      en-US: Enable HTTPS
    type: boolean
    required: false
    defaultValue: false
  - field: username
    name:
      zh-CN: 用户名
      en-US: Username
    type: text
    required: false
    hide: true
  - field: password
    name:
      zh-CN: 密码
      en-US: Password
    type: password
    required: false
    hide: true
metrics:
  - name: server_info
    i18n:
      zh-CN: 服务器信息
      en-US: Server Info
    priority: 0
    fields:
      - field: Version
        type: 1
      - field: StartTimeMs
        type: 1
      - field: CommitId
        type: 1
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: ^_^path^_^
      method: POST
      headers.Content-Type: application/json
      headers.Accept: application/json
      body: '{"type":"read","mbean":"kafka.server:type=app-info,id=*","attribute":["Version","StartTimeMs","CommitId"]}'
      parseType: jsonPath
      parseScript: $.value.*
      authorization.basicAuthUsername: ^_^username^_^
      authorization.basicAuthPassword: ^_^password^_^
  - name: jvm_basic
    i18n:
      zh-CN: 虚拟机基础信息
      en-US: JVM Basic
    priority: 1
    fields:
      - field: VmName
        type: 1
      - field: VmVendor
        type: 1
      - field: VmVersion
        type: 1
      - field: Uptime
        type: 0
        unit: ms
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: ^_^path^_^
      method: POST
      headers.Content-Type: application/json
      headers.Accept: application/json
      body: '{"type":"read","mbean":"java.lang:type=Runtime","attribute":["VmName","VmVendor","VmVersion","Uptime"]}'
      parseType: jsonPath
      parseScript: $.value
      authorization.basicAuthUsername: ^_^username^_^
      authorization.basicAuthPassword: ^_^password^_^
  - name: kafka_controller_active_broker_count
    i18n:
      zh-CN: Kafka活跃Broker数量
      en-US: Active Broker Count
    priority: 2
    fields:
      - field: ActiveBrokerCount
        type: 0
    calculates:
      - ActiveBrokerCount=$.value
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: ^_^path^_^
      method: POST
      headers.Content-Type: application/json
      headers.Accept: application/json
      body: '{"type":"read","mbean":"kafka.controller:type=KafkaController,name=ActiveBrokerCount","attribute":"Value"}'
      parseType: jsonPath
      parseScript: $
      authorization.basicAuthUsername: ^_^username^_^
      authorization.basicAuthPassword: ^_^password^_^
