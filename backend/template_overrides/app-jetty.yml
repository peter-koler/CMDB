category: webserver
app: jetty
name:
  zh-CN: Jetty应用服务器
  en-US: Jetty AppServer
help:
  zh-CN: 基于 Jolokia HTTP 接口采集 Jetty Server、线程池与 JVM 指标。请确保 Jetty 已启用 Jolokia Agent。
  en-US: Monitor Jetty server, thread pool and JVM metrics through Jolokia HTTP endpoint.
helpLink:
  zh-CN: https://hertzbeat.apache.org/zh-cn/docs/help/jetty/
  en-US: https://hertzbeat.apache.org/docs/help/jetty/
params:
  - field: host
    name:
      zh-CN: 目标 Host
      en-US: Target Host
    type: host
    required: true
  - field: port
    name:
      zh-CN: Jolokia 端口
      en-US: Jolokia Port
    type: number
    range: '[0,65535]'
    required: true
    defaultValue: 8778
  - field: path
    name:
      zh-CN: Jolokia 路径
      en-US: Jolokia Path
    type: text
    required: true
    defaultValue: /jolokia/
  - field: ssl
    name:
      zh-CN: 启用 HTTPS
      en-US: Enable HTTPS
    type: boolean
    required: false
    defaultValue: false
  - field: username
    name:
      zh-CN: 用户名
      en-US: Username
    type: text
    required: false
    hide: true
  - field: password
    name:
      zh-CN: 密码
      en-US: Password
    type: password
    required: false
    hide: true
metrics:
  - name: jvm_basic
    i18n:
      zh-CN: JVM 基础信息
      en-US: JVM Basic
    priority: 0
    fields:
      - field: VmName
        type: 1
      - field: VmVendor
        type: 1
      - field: VmVersion
        type: 1
      - field: Uptime
        type: 0
        unit: ms
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: ^_^path^_^
      method: POST
      headers.Content-Type: application/json
      headers.Accept: application/json
      body: '{"type":"read","mbean":"java.lang:type=Runtime","attribute":["VmName","VmVendor","VmVersion","Uptime"]}'
      parseType: jsonPath
      parseScript: $.value
      authorization.basicAuthUsername: ^_^username^_^
      authorization.basicAuthPassword: ^_^password^_^
  - name: jetty_server
    i18n:
      zh-CN: Jetty 服务
      en-US: Jetty Server
    priority: 1
    fields:
      - field: version
        type: 1
      - field: state
        type: 1
      - field: startupTime
        type: 0
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: ^_^path^_^
      method: POST
      headers.Content-Type: application/json
      headers.Accept: application/json
      body: '{"type":"read","mbean":"org.eclipse.jetty.server:type=server,id=*","attribute":["version","state","startupTime"]}'
      parseType: jsonPath
      parseScript: $.value.*
      authorization.basicAuthUsername: ^_^username^_^
      authorization.basicAuthPassword: ^_^password^_^
  - name: thread_pool
    i18n:
      zh-CN: Jetty 线程池
      en-US: Jetty Thread Pool
    priority: 1
    fields:
      - field: name
        type: 1
        label: true
      - field: threads
        type: 0
      - field: idleThreads
        type: 0
      - field: busyThreads
        type: 0
      - field: queueSize
        type: 0
      - field: maxThreads
        type: 0
      - field: minThreads
        type: 0
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: ^_^path^_^
      method: POST
      headers.Content-Type: application/json
      headers.Accept: application/json
      body: '{"type":"read","mbean":"org.eclipse.jetty.util.thread:type=queuedthreadpool,id=*","attribute":["name","threads","idleThreads","busyThreads","queueSize","maxThreads","minThreads"]}'
      parseType: jsonPath
      parseScript: $.value.*
      authorization.basicAuthUsername: ^_^username^_^
      authorization.basicAuthPassword: ^_^password^_^
  - name: jvm_memory
    i18n:
      zh-CN: JVM 内存
      en-US: JVM Memory
    priority: 2
    fields:
      - field: heap_used
        type: 0
        unit: B
      - field: heap_max
        type: 0
        unit: B
      - field: nonheap_used
        type: 0
        unit: B
      - field: nonheap_max
        type: 0
        unit: B
      - field: ObjectPendingFinalizationCount
        type: 0
    calculates:
      - heap_used=$.value.HeapMemoryUsage.used
      - heap_max=$.value.HeapMemoryUsage.max
      - nonheap_used=$.value.NonHeapMemoryUsage.used
      - nonheap_max=$.value.NonHeapMemoryUsage.max
      - ObjectPendingFinalizationCount=$.value.ObjectPendingFinalizationCount
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: ^_^path^_^
      method: POST
      headers.Content-Type: application/json
      headers.Accept: application/json
      body: '{"type":"read","mbean":"java.lang:type=Memory","attribute":["HeapMemoryUsage","NonHeapMemoryUsage","ObjectPendingFinalizationCount"]}'
      parseType: jsonPath
      parseScript: $
      authorization.basicAuthUsername: ^_^username^_^
      authorization.basicAuthPassword: ^_^password^_^
  - name: jvm_gc
    i18n:
      zh-CN: JVM GC
      en-US: JVM GC
    priority: 3
    fields:
      - field: name
        type: 1
        label: true
      - field: CollectionCount
        type: 0
      - field: CollectionTime
        type: 0
        unit: ms
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      ssl: ^_^ssl^_^
      url: ^_^path^_^
      method: POST
      headers.Content-Type: application/json
      headers.Accept: application/json
      body: '{"type":"read","mbean":"java.lang:type=GarbageCollector,name=*","attribute":["name","CollectionCount","CollectionTime"]}'
      parseType: jsonPath
      parseScript: $.value.*
      authorization.basicAuthUsername: ^_^username^_^
      authorization.basicAuthPassword: ^_^password^_^
