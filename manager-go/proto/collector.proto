syntax = "proto3";

package collector.v1;

option go_package = "manager-go/internal/pb;pb";

enum AckStatus {
  ACK_STATUS_UNSPECIFIED = 0;
  ACK_STATUS_RECEIVED = 1;
  ACK_STATUS_APPLIED = 2;
  ACK_STATUS_REJECTED = 3;
  ACK_STATUS_NOT_FOUND = 4;
}

message CommandAck {
  int64 command_id = 1;
  int64 job_id = 2;
  string command_type = 3; // upsert | delete
  AckStatus status = 4;
  string reason = 5;
  int64 unix_ms = 6;
}

message DeleteJobCommand {
  int64 command_id = 1;
  int64 job_id = 2;
}

message CollectTask {
  int64 job_id = 1;
  int64 monitor_id = 2;
  string app = 3;
  int64 interval_ms = 4;
  repeated MetricsTask tasks = 5;
  int64 command_id = 6;
  int64 version = 7;
  string trace_id = 8;
}

message MetricsTask {
  string name = 1;
  string protocol = 2;
  int64 timeout_ms = 3;
  int32 priority = 4;
  map<string, string> params = 5;
  repeated Transform transform = 6;
}

message Transform {
  string field = 1;
  string op = 2;
}

message CollectRep {
  int64 job_id = 1;
  int64 monitor_id = 2;
  string app = 3;
  string metrics = 4;
  string protocol = 5;
  int64 time_unix_ms = 6;
  bool success = 7;
  string message = 8;
  map<string, string> fields = 9;
  int64 raw_latency_ms = 10;
}

message Heartbeat {
  int64 unix_ms = 1;
}

message ManagerFrame {
  oneof payload {
    CollectRep report = 1;
    CommandAck ack = 2;
    Heartbeat heartbeat = 3;
  }
}

message CollectorFrame {
  oneof payload {
    CollectTask upsert = 1;
    int64 delete_job_id = 2 [deprecated = true];
    Heartbeat heartbeat = 3;
    DeleteJobCommand delete = 4;
  }
}

service CollectorService {
  rpc Connect(stream CollectorFrame) returns (stream ManagerFrame);
}
