services:
  redis:
    image: docker.io/redis:7.2-alpine
    container_name: arco-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - redis-data:/data
    # 修正：使用 mem_limit 和 cpus（兼容非 swarm 模式）
    mem_limit: 512M
    cpus: '0.5'
    networks:
      - arco-network

  postgres:
    image: m.daocloud.io/docker.io/library/postgres:16-alpine  # 使用已拉取的国内镜像
    container_name: arco-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-arco_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-arco_password}
      - POSTGRES_DB=${POSTGRES_DB:-arco_db}
      - TZ=${TZ:-Asia/Shanghai}
    command:
      - "postgres"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-100}"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-4GB}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arco_user} -d ${POSTGRES_DB:-arco_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # 可选：创建 init-scripts 目录存放初始化 SQL
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    mem_limit: 1G
    cpus: '1.0'
    networks:
      - arco-network

  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: arco-victoria-metrics
    restart: unless-stopped
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--retentionPeriod=${VM_RETENTION_PERIOD:-30d}"
      - "--httpListenAddr=:8428"
      - "--selfScrapeInterval=5s"
    ports:
      - "${VM_PORT:-8428}:8428"
    healthcheck:
      # 修正：使用 wget 替代 curl（alpine 镜像默认没有 curl）
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8428/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - vm-data:/victoria-metrics-data
    mem_limit: 1G
    cpus: '1.0'
    networks:
      - arco-network

volumes:
  redis-data:
  postgres-data:
  vm-data:

networks:
  arco-network:
    driver: bridge